
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .prose h1 { font-size: 2rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
    .prose h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.75rem; margin-bottom: 0.75rem; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .prose p { margin-top: 1rem; margin-bottom: 1rem; line-height: 1.75; }
    .prose ul, .prose ol { padding-left: 1.5rem; margin-top: 1rem; margin-bottom: 1rem; }
    .prose li { margin-top: 0.25rem; margin-bottom: 0.25rem; line-height: 1.75; }
    .prose code { background: #f3f4f6; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; }
    .prose pre { background: #1f2937; color: #f9fafb; padding: 1rem 1.25rem; border-radius: 0.5rem; overflow-x: auto; margin: 1.5rem 0; }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose blockquote { border-left: 3px solid #d1d5db; padding-left: 1rem; color: #6b7280; margin: 1.5rem 0; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose img { border-radius: 0.5rem; margin: 1.5rem auto; max-width: 100%; }
    .prose hr { border: 0; border-top: 1px solid #e5e7eb; margin: 2rem 0; }
    .prose strong { font-weight: 600; color: #111827; }
  </style>
</head>
<body class="bg-white text-gray-900 min-h-screen">

  <nav class="border-b border-gray-200 sticky top-0 bg-white/80 backdrop-blur z-10">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="font-bold text-lg tracking-tight">My Blog</a>
      <div class="flex gap-4 text-sm text-gray-500">
        <a href="/" class="hover:text-gray-900 transition-colors">首页</a>
        <a href="#" class="hover:text-gray-900 transition-colors">关于</a>
      </div>
    </div>
  </nav>

  
<main class="max-w-2xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold tracking-tight mb-8">文章列表</h1>

  <div class="space-y-6" id="post-list"></div>

  <div class="flex justify-center gap-1 mt-12" id="pagination"></div>
</main>

<script>
  const POSTS = [{"title":"初始化博客","date":"2026-07-21","slug":"初始化博客","tags":["Go","前端"]}];
  const PAGE_SIZE = 10;

  let page = 0;
  const totalPages = Math.max(1, Math.ceil(POSTS.length / PAGE_SIZE));

  function renderPost(post) {
    const tagsHTML = (post.tags || []).map(t =>
      `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${t}</span>`
    ).join('');

    return `
      <a href="/posts/${post.slug}/" class="block group">
        <article class="border border-gray-200 rounded-lg p-5 hover:border-gray-400 hover:shadow-sm transition-all">
          <h2 class="text-lg font-semibold group-hover:text-blue-600 transition-colors">${post.title}</h2>
          <p class="text-sm text-gray-400 mt-1">${post.date || ''}</p>
          ${tagsHTML ? `<div class="flex gap-2 mt-3">${tagsHTML}</div>` : ''}
        </article>
      </a>`;
  }

  function renderPage() {
    if (POSTS.length === 0) {
      document.getElementById('post-list').innerHTML =
        '<p class="text-gray-400 text-center py-12">还没有文章</p>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    const start = page * PAGE_SIZE;
    const slice = POSTS.slice(start, start + PAGE_SIZE);
    document.getElementById('post-list').innerHTML = slice.map(renderPost).join('');

    let html = '';
    html += `<button onclick="goPage(${page - 1})" ${page === 0 ? 'disabled' : ''}
      class="px-3 py-1.5 text-sm rounded border border-gray-200 ${page === 0 ? 'text-gray-300 cursor-not-allowed' : 'hover:border-gray-400 transition-colors'}">上一页</button>`;

    for (let i = 0; i < totalPages; i++) {
      if (i === page) {
        html += `<button class="px-3 py-1.5 text-sm rounded bg-gray-900 text-white font-medium">${i + 1}</button>`;
      } else {
        html += `<button onclick="goPage(${i})"
          class="px-3 py-1.5 text-sm rounded border border-gray-200 hover:border-gray-400 transition-colors">${i + 1}</button>`;
      }
    }

    html += `<button onclick="goPage(${page + 1})" ${page >= totalPages - 1 ? 'disabled' : ''}
      class="px-3 py-1.5 text-sm rounded border border-gray-200 ${page >= totalPages - 1 ? 'text-gray-300 cursor-not-allowed' : 'hover:border-gray-400 transition-colors'}">下一页</button>`;

    document.getElementById('pagination').innerHTML = html;
  }

  function goPage(p) {
    if (p < 0 || p >= totalPages) return;
    page = p;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderPage();
</script>


  <footer class="border-t border-gray-200 mt-16">
    <div class="max-w-2xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
      &copy; 2026 My Blog
    </div>
  </footer>

</body>
</html>
