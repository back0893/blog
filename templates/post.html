{{define "title"}}{{.Title}} - My Blog{{end}}

{{define "content"}}
<main class="max-w-2xl mx-auto px-4 py-12">
  <a href="/" class="inline-flex items-center text-sm text-gray-400 hover:text-gray-600 transition-colors mb-8">
    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    返回首页
  </a>

  <header class="mb-8">
    <h1 class="text-3xl font-bold tracking-tight">{{.Title}}</h1>
    <div class="flex items-center gap-3 mt-3 text-sm text-gray-400">
      {{if .Date}}<time>{{.Date}}</time>{{end}}
    </div>
    {{if .Tags}}
    <div class="flex gap-2 mt-4">
      {{range .Tags}}
      <span class="text-xs bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full">{{.}}</span>
      {{end}}
    </div>
    {{end}}
  </header>

  <article class="prose text-gray-700">
    {{.Body}}
  </article>

  <div class="flex justify-between items-center mt-12 pt-6 border-t border-gray-200 text-sm">
    {{if .Prev}}
    <a href="/posts/{{.Prev.Slug}}/" class="text-gray-500 hover:text-gray-900 transition-colors">
      ← {{.Prev.Title}}
    </a>
    {{else}}
    <span class="text-gray-300">← 上一篇</span>
    {{end}}

    {{if .Next}}
    <a href="/posts/{{.Next.Slug}}/" class="text-gray-500 hover:text-gray-900 transition-colors">
      {{.Next.Title}} →
    </a>
    {{else}}
    <span class="text-gray-300">下一篇 →</span>
    {{end}}
  </div>
</main>
{{end}}
